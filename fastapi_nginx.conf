server {
    listen 80;
    server_name 13.48.78.233.nip.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name 13.48.78.233.nip.io;

    ssl_certificate /etc/letsencrypt/live/13.48.78.233.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/13.48.78.233.nip.io/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # We need to increase timeout limits for heavy PDF processing
        proxy_read_timeout 300; 
        proxy_connect_timeout 300;
        proxy_send_timeout 300;

        # Allow large file uploads (e.g., up to 50MB) 
        client_max_body_size 50M; 
    }
}
